bind 0.0.0.0
daemonize no
requirepass root 

appendonly no
# auto-aof-rewrite-percentage 100
# auto-aof-rewrite-min-size 64mb

dbfilename dump.rdb
save 900 1
# save 300 10
# save 60 10000
dir /data/
# 如果持久化出错，主进程是否停止写入
stop-writes-on-bgsave-error yes
# 是否压缩rdb文件
rdbcompression yes

# 设置最大内存
maxmemory 1gb
# 当内存满时，淘汰最近最少使用的键
maxmemory-policy allkeys-lru


tcp-keepalive 300 
stop-writes-on-bgsave-error no